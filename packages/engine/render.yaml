services:
  - type: web
    name: orbinex-engine
    runtime: node
    rootDir: packages/engine
    buildCommand: npm install && npm run build
    startCommand: node dist/index.js
    envVars:
      - key: PORT
        value: 3001
      - key: LLM_PROVIDER
        value: ollama
      - key: LLM_MODEL
        value: qwen2.5
      - key: MCP_SERVER_URL
        value: https://orbinex-mcp-server.onrender.com
      - key: MCP_API_KEY
        value: orbinex-secret-2025